name: 上游更新檢查

on:
  schedule:
    # 每週一 02:00 UTC 檢查上游 jfamily4tw/voicetype4tw-mac 的三個追蹤分支
    # （win-go-mask-202607 / win-stable / main）是否有比 last_reviewed 新的 commit。
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v7

      - name: 設定 Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: 檢查上游更新
        id: upstream
        run: |
          python tools/check_upstream_updates.py \
            --github-output \
            --output upstream-check-report.md

      - name: 建立或更新提醒 issue
        if: steps.upstream.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue="$(gh issue list --state open --search '上游更新檢查 in:title' --json number --jq '.[0].number // empty')"
          if [ -n "$issue" ]; then
            gh issue comment "$issue" --body-file upstream-check-report.md
          else
            gh issue create \
              --title "上游更新檢查：有新 commit 待審視" \
              --body-file upstream-check-report.md
          fi
