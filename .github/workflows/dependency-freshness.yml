name: 依賴新鮮度檢查

on:
  schedule:
    # 每月 1 日檢查 requirements-win.txt / requirements-cuda-win.txt 內套件是否有新版，
    # 提醒是否需要重發可攜版 ZIP。
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v7

      - name: 設定 Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      # 注意：requirements-win.txt 內含 pywin32（Windows-only wheel），故不在此
      # ubuntu-latest runner 上安裝完整依賴。check_dependency_freshness.py 在
      # 套件未安裝時，會自動退回比對 requirements 檔宣告的最低版本
      # （`requirements-min`），足以判斷版本下限是否落後，不需要真的裝好整組依賴。
      - name: 檢查依賴新鮮度
        id: deps
        run: |
          python tools/check_dependency_freshness.py \
            --github-output \
            --output dependency-freshness-report.md

      - name: 建立或更新維護提醒 issue
        if: steps.deps.outputs.outdated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue="$(gh issue list --state open --search '依賴新鮮度檢查 in:title' --json number --jq '.[0].number // empty')"
          if [ -n "$issue" ]; then
            gh issue comment "$issue" --body-file dependency-freshness-report.md
          else
            gh issue create \
              --title "依賴新鮮度檢查：需要維護" \
              --body-file dependency-freshness-report.md
          fi
